<!DOCTYPE html>
<html lang="en-US">

<head>
    <base href="https://cdn.jsdelivr.net/gh/daso3-max/MonkeyMart@main/">
    <title>Geometry Dash Lite - Modded</title>
    <link rel="icon" type="image/png" href="https://e3334afd.cf-nate.pages.dev/0/g/geodash/game/splash.png">
    <meta name="description" content="Play Geometry Dash Lite with Auto Play & God Mode">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <style>
        html {
            box-sizing: border-box;
        }
        
        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }
        
        body {
            margin: 0;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            width: 100vw;
            height: 100vh;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        canvas+* {
            z-index: 2;
        }
        
        .logo {
            position: absolute;
            display: block;
            max-width: 100vw;
            max-height: 70vh;
            top: 300px;
        }
        
        .pos_progress {
            position: absolute;
            bottom: 15%;
            width: 100%;
        }
        
        .progress {
            margin: 1.5em auto;
            max-width: 436px;
            height: auto;
            display: none;
            position: relative;
        }
        
        .full {
            width: 97%;
            transform-origin: top left;
        }
        
        .box_process {
            width: 100%;
        }
        
        .progress .posfull,
        .progress .posbox {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .progress .posfull {
            top: 8px;
            z-index: 1;
        }
        
        .progress .posbox {
            top: 0;
            z-index: 2;
        }
        
        #loader {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
        }
        
        .spinner {
            display: none;
            border-radius: 50%;
            width: 5em;
            height: 5em;
            margin: 10px;
            font-size: 10px;
            position: relative;
            text-indent: -9999em;
            border-top: 1.1em solid rgba(255, 255, 255, 0.2);
            border-right: 1.1em solid rgba(255, 255, 255, 0.2);
            border-bottom: 1.1em solid rgba(255, 255, 255, 0.2);
            border-left: 1.1em solid #ffffff;
            transform: translateZ(0);
            animation: spinner-spin 1.1s infinite linear;
        }
        
        @keyframes spinner-spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* MOD MENU STYLES */
        #modMenu {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #ff00ff;
            border-radius: 8px;
            color: #ff00ff;
            font-size: 14px;
            max-width: 300px;
            z-index: 10000;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
        }
        
        .mod-header {
            background: #ff00ff;
            color: #000;
            padding: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px 5px 0 0;
        }
        
        .mod-content {
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .mod-content.hidden {
            display: none;
        }
        
        .mod-section {
            margin-bottom: 12px;
            border-bottom: 2px solid #ff00ff;
            padding-bottom: 10px;
        }
        
        .mod-section:last-child {
            border-bottom: none;
        }
        
        .mod-title {
            color: #ff00ff;
            font-weight: bold;
            margin-bottom: 8px;
            text-decoration: underline;
            font-size: 13px;
        }
        
        .mod-button {
            background: #ff00ff;
            color: #000;
            border: 2px solid #ff00ff;
            padding: 8px 12px;
            margin: 4px 0;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.2s;
            font-size: 13px;
            width: 100%;
            text-align: center;
        }
        
        .mod-button:hover {
            background: #dd00dd;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.8);
        }
        
        .mod-button:active {
            background: #bb00bb;
        }
        
        .mod-button.active {
            background: #00ff00;
            color: #000;
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
        }
        
        .mod-status {
            color: #00ff00;
            font-size: 12px;
            margin-top: 8px;
            padding: 8px;
            background: rgba(0, 255, 0, 0.15);
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 0, 0.5);
        }

        .shortcut-info {
            color: #00ff00;
            font-size: 10px;
            margin-top: 8px;
            padding: 6px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 3px;
        }
    </style>

    <div id="gameContainer"></div>
    <div id="loader">
        <img class="logo" src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/gdlite/image/loading.png?v=1">
        <div class="spinner"></div>
        <div class="pos_progress">
            <div class="progress">
                <div class="posfull"><img class="full" src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/gdlite/image/process_bar_back.png"></div>
                <div class="posbox"><img class="box_process" src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/gdlite/image/process_bar_front.png"></div>
            </div>
        </div>
    </div>

    <!-- MOD MENU -->
    <div id="modMenu">
        <div class="mod-header" onclick="toggleModMenu()">
            <span>🎮 MOD MENU</span>
            <span id="toggleBtn">−</span>
        </div>
        <div id="modContent" class="mod-content">
            <div class="mod-section">
                <div class="mod-title">⚡ GOD MODE</div>
                <button class="mod-button" id="godModeBtn" onclick="toggleGodMode()">God Mode: OFF</button>
                <div class="shortcut-info">Ctrl+Shift+G</div>
            </div>
            
            <div class="mod-section">
                <div class="mod-title">🤖 AUTO PLAY</div>
                <button class="mod-button" id="autoPlayBtn" onclick="toggleAutoPlay()">Auto Play: OFF</button>
                <div class="shortcut-info">Ctrl+Shift+A</div>
            </div>
            
            <div class="mod-status" id="modStatus">Status: Ready</div>
        </div>
    </div>

    <script>
        // Toggle mod menu visibility
        function toggleModMenu() {
            const modContent = document.getElementById('modContent');
            const toggleBtn = document.getElementById('toggleBtn');
            modContent.classList.toggle('hidden');
            toggleBtn.textContent = modContent.classList.contains('hidden') ? '+' : '−';
        }

        // Toggle God Mode
        function toggleGodMode() {
            modMenu.godMode();
            const btn = document.getElementById('godModeBtn');
            btn.classList.toggle('active');
            btn.textContent = modMenu.state.godModeActive ? 'God Mode: ON' : 'God Mode: OFF';
        }

        // Toggle Auto Play
        function toggleAutoPlay() {
            modMenu.autoPlay();
            const btn = document.getElementById('autoPlayBtn');
            btn.classList.toggle('active');
            btn.textContent = modMenu.state.autoPlayActive ? 'Auto Play: ON' : 'Auto Play: OFF';
        }
    </script>

    <!-- File Merger Configuration -->
    <script>
        window.fileMergerConfig = {
            files: [
                { name: 'GeometryDashLite.data.unityweb', parts: 2 },
                { name: 'GeometryDashLite.wasm.code.unityweb', parts: 1 },
                { name: 'GeometryDashLite.wasm.framework.unityweb', parts: 1 },
            ],
            basePath: 'https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/gdlite/Build/',
            debug: false
        };
    </script>

    <!-- Mod Menu System from YOUR MonkeyMart Repository -->
    <script src="js/modMenu.js"></script>
    <script src="js/gameHooks.js"></script>

    <!-- File Merger & Unity Loader from bubbls -->
    <script src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/merge.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/gdlite/Build/UnityLoader.js"></script>

    <!-- Game Initialization -->
    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/gdlite/Build/GeometryDashLite.json", {
            onProgress: UnityProgress
        });

        function UnityProgress(gameInstance, progress) {
            if (!gameInstance.Module) {
                return;
            }
            const loader = document.querySelector("#loader");
            if (!gameInstance.progress) {
                const progress = document.querySelector("#loader .progress");
                progress.style.display = "block";
                gameInstance.progress = progress.querySelector(".full");
                loader.querySelector(".spinner").style.display = "none";
            }
            gameInstance.progress.style.transform = `scaleX(${progress})`;
            if (progress === 1 && !gameInstance.removeTimeout) {
                gameInstance.removeTimeout = setTimeout(function() {
                    loader.style.display = "none";
                    initializeModMenu();
                }, 2000);
            }
        }

        // Auto-click OK buttons
        document.addEventListener('DOMContentLoaded', function() {
            let buttondiv = document.getElementsByTagName('button');
            for (let i = 0; i < buttondiv.length; i++) {
                if (buttondiv[i].innerHTML == "OK") {
                    buttondiv[i].click();
                }
            }
            setTimeout(function() {
                let buttonok = document.getElementsByTagName('button');
                for (let i = 0; i < buttondiv.length; i++) {
                    if (buttonok[i].innerHTML == "OK") {
                        buttonok[i].click();
                    }
                }
            }, 1000);
        });
    </script>
</body>

</html>
