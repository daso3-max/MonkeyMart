<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>Geometry Dash - Modded</title>
    <link rel="icon" type="image/png" href="https://e3334afd.cf-nate.pages.dev/0/g/geodash/game/splash.png">
    <meta name="description" content="Play Geometry Dash Lite Online with Mod Menu">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <style>
        html {
            box-sizing: border-box;
        }
        
        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }
        
        body {
            margin: 0;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            width: 100vw;
            height: 100vh;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        canvas+* {
            z-index: 2;
        }
        
        .logo {
            position: absolute;
            display: block;
            max-width: 100vw;
            max-height: 70vh;
            top: 300px;
        }
        
        .pos_progress {
            position: absolute;
            bottom: 15%;
            width: 100%;
        }
        
        .progress {
            margin: 1.5em auto;
            max-width: 436px;
            height: auto;
            display: none;
            position: relative;
        }
        
        .full {
            width: 97%;
            transform-origin: top left;
        }
        
        .box_process {
            width: 100%;
        }
        
        .process {
            width: 98%;
        }
        
        .progress .posfull,
        .progress .posbox {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .progress .posfull {
            top: 8px;
            z-index: 1;
        }
        
        .progress .posbox {
            top: 0;
            z-index: 2;
        }
        
        #loader {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
        }
        
        .spinner {
            display: none;
            border-radius: 50%;
            width: 5em;
            height: 5em;
            margin: 10px;
            font-size: 10px;
            position: relative;
            text-indent: -9999em;
            border-top: 1.1em solid rgba(255, 255, 255, 0.2);
            border-right: 1.1em solid rgba(255, 255, 255, 0.2);
            border-bottom: 1.1em solid rgba(255, 255, 255, 0.2);
            border-left: 1.1em solid #ffffff;
            transform: translateZ(0);
            animation: spinner-spin 1.1s infinite linear;
        }
        
        @keyframes spinner-spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        /* MOD MENU STYLES */
        #modMenu {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #00ff00;
            border-radius: 8px;
            color: #00ff00;
            font-size: 14px;
            max-width: 350px;
            z-index: 10000;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
        
        #modMenu.minimized {
            max-width: 200px;
        }
        
        .mod-header {
            background: #00ff00;
            color: #000;
            padding: 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        
        .mod-content {
            padding: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .mod-content.hidden {
            display: none;
        }
        
        .mod-section {
            margin-bottom: 10px;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 8px;
        }
        
        .mod-section:last-child {
            border-bottom: none;
        }
        
        .mod-title {
            color: #00ff00;
            font-weight: bold;
            margin-bottom: 5px;
            text-decoration: underline;
        }
        
        .mod-button {
            background: #00ff00;
            color: #000;
            border: 2px solid #00ff00;
            padding: 6px 10px;
            margin: 3px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.2s;
            font-size: 12px;
        }
        
        .mod-button:hover {
            background: #00cc00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
        
        .mod-button:active {
            background: #009900;
        }
        
        .mod-toggle {
            display: inline-block;
            width: 30px;
            height: 15px;
            background: #333;
            border: 2px solid #00ff00;
            border-radius: 7px;
            position: relative;
            cursor: pointer;
            margin-left: 5px;
        }
        
        .mod-toggle.active {
            background: #00ff00;
        }
        
        .mod-toggle::before {
            content: '';
            position: absolute;
            width: 11px;
            height: 11px;
            background: #00ff00;
            border-radius: 50%;
            top: 1px;
            left: 1px;
            transition: all 0.3s;
        }
        
        .mod-toggle.active::before {
            left: 14px;
            background: #000;
        }
        
        .mod-status {
            color: #00ff00;
            font-size: 11px;
            margin-top: 5px;
            padding: 5px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 3px;
        }
    </style>
    
    <div id="gameContainer"></div>
    <div id="loader"><img class="logo" src="image/loading.png?v=1">
        <div class="spinner"></div>
        <div class="pos_progress">
            <div class="progress">
                <div class="posfull"><img class="full" src="image/process_bar_back.png"></div>
                <div class="posbox"><img class="box_process" src="image/process_bar_front.png"></div>
            </div>
        </div>
    </div>
    
    <!-- MOD MENU -->
    <div id="modMenu">
        <div class="mod-header" onclick="toggleModMenu()">
            <span>⚙️ MOD MENU</span>
            <span id="toggleBtn">−</span>
        </div>
        <div id="modContent" class="mod-content">
            <div class="mod-section">
                <div class="mod-title">Power-Ups</div>
                <button class="mod-button" onclick="modMenu.grantAllPowerUps()">Grant All Power-Ups</button>
                <button class="mod-button" onclick="modMenu.maxPowerUps()">Max All Power-Ups</button>
            </div>
            
            <div class="mod-section">
                <div class="mod-title">Player Abilities</div>
                <button class="mod-button" onclick="modMenu.unlimitedJumps()">Unlimited Jumps</button>
                <button class="mod-button" onclick="modMenu.speedBoost()">Speed Boost</button>
                <button class="mod-button" onclick="modMenu.godMode()">God Mode</button>
            </div>
            
            <div class="mod-section">
                <div class="mod-title">Gameplay</div>
                <button class="mod-button" onclick="modMenu.noClip()">No Clip</button>
                <button class="mod-button" onclick="modMenu.freezeTime()">Freeze Time</button>
                <button class="mod-button" onclick="modMenu.skipLevel()">Skip Level</button>
                <button class="mod-button" onclick="modMenu.unlockAllLevels()">Unlock All Levels</button>
            </div>
            
            <div class="mod-section">
                <div class="mod-title">Currency & Resources</div>
                <button class="mod-button" onclick="modMenu.addCurrency(1000)">+ 1000 Gold</button>
                <button class="mod-button" onclick="modMenu.addCurrency(10000)">+ 10000 Gold</button>
                <button class="mod-button" onclick="modMenu.maxCurrency()">Max Currency</button>
            </div>
            
            <div class="mod-section">
                <div class="mod-title">Developer Tools</div>
                <button class="mod-button" onclick="modMenu.showConsole()">Toggle Console</button>
                <button class="mod-button" onclick="modMenu.showStats()">Show Stats</button>
                <button class="mod-button" onclick="modMenu.dumpGameState()">Dump Game State</button>
            </div>
            
            <div class="mod-status" id="modStatus">Status: Ready</div>
        </div>
    </div>
    
    <script src="js/modMenu.js"></script>
    <script src="js/gameHooks.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "Build/GeometryDashLite.json", {
            onProgress: UnityProgress
        });

        function UnityProgress(gameInstance, progress) {
            if (!gameInstance.Module) {
                return;
            }
            const loader = document.querySelector("#loader");
            if (!gameInstance.progress) {
                const progress = document.querySelector("#loader .progress");
                progress.style.display = "block";
                gameInstance.progress = progress.querySelector(".full");
                loader.querySelector(".spinner").style.display = "none";
            }
            gameInstance.progress.style.transform = `scaleX(${progress})`;
            if (progress === 1 && !gameInstance.removeTimeout) {
                gameInstance.removeTimeout = setTimeout(function() {
                    loader.style.display = "none";
                    initializeModMenu();
                }, 2000);
            }
        }
    </script>
</body>

</html>
